<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/recipes/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff8f2;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    #boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #6f4a2f;
      transition: opacity 180ms ease;
      background: radial-gradient(circle at 50% 35%, #fff2e4 0%, #fff8f2 52%, #ffffff 100%);
    }

    .boot-wrap {
      text-align: center;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid #ffd8b4;
      border-top-color: #f08a24;
      margin: 0 auto 12px;
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Primary Meta Tags -->
  <meta name="title" content="Rezepte-App - Deine persönliche Rezeptsammlung">
  <meta name="description" content="Verwalte deine Rezepte, erstelle Einkaufslisten und teile kulinarische Kreationen mit deiner Gruppe. Optimiert für Web und Mobile.">
  <meta name="keywords" content="rezepte, kochen, rezeptsammlung, einkaufsliste, kochbuch">
  <meta name="author" content="HephisApps">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Rezepte-App - Deine persönliche Rezeptsammlung">
  <meta property="og:description" content="Verwalte deine Rezepte, erstelle Einkaufslisten und teile kulinarische Kreationen mit deiner Gruppe.">
  <meta property="og:site_name" content="Rezepte-App">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Rezepte-App - Deine persönliche Rezeptsammlung">
  <meta property="twitter:description" content="Verwalte deine Rezepte, erstelle Einkaufslisten und teile kulinarische Kreationen mit deiner Gruppe.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rezepte">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- App Title -->
  <title>Rezepte-App</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = "2893336395" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="boot" aria-live="polite">
    <div class="boot-wrap">
      <div class="spinner"></div>
      <div>Lade Rezepte-App...</div>
    </div>
  </div>
  <script>
  window.addEventListener('DOMContentLoaded', function() {
    _flutter.loader.loadEntrypoint({
      serviceWorker: {
        serviceWorkerVersion: serviceWorkerVersion,
      },
      onEntrypointLoaded: async function(engineInitializer) {
        let appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
        const boot = document.getElementById('boot');
        if (boot) {
          boot.style.opacity = '0';
          setTimeout(() => boot.remove(), 180);
        }
      }
    });
  });
</script>
</body>
</html>
